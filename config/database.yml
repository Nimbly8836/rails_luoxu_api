<%
require "uri"

database_name_for = lambda do |env_name, default_name|
  value = ENV[env_name]
  value.nil? || value.empty? ? default_name : value
end

database_url_for = lambda do |database_name, *url_env_names|
  source_url = url_env_names.lazy.map { |env_name| ENV[env_name] }.find { |value| !value.nil? && !value.empty? }
  next if source_url.nil?

  uri = URI.parse(source_url)
  uri.path = "/#{database_name}"
  uri.to_s
rescue URI::InvalidURIError
  source_url
end

production_primary_database = database_name_for.call("RAILS_LUOXU_API_DATABASE_NAME", "rails_luoxu_api_production")
production_cache_database = database_name_for.call("RAILS_LUOXU_API_DATABASE_CACHE_NAME", "rails_luoxu_api_production_cache")
production_queue_database = database_name_for.call("RAILS_LUOXU_API_DATABASE_QUEUE_NAME", "rails_luoxu_api_production_queue")
production_cable_database = database_name_for.call("RAILS_LUOXU_API_DATABASE_CABLE_NAME", "rails_luoxu_api_production_cable")
%>

# PostgreSQL. Versions 9.3 and up are supported.
#
# Install the pg driver:
#   gem install pg
# On macOS with Homebrew:
#   gem install pg -- --with-pg-config=/usr/local/bin/pg_config
# On Windows:
#   gem install pg
#       Choose the win32 build.
#       Install PostgreSQL and put its /bin directory on your path.
#
# Configure Using Gemfile
# gem "pg"
#
default: &default
  adapter: postgresql
  encoding: unicode
  # For details on connection pooling, see Rails configuration guide
  # https://guides.rubyonrails.org/configuring.html#database-pooling
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 10 } %>


development:
  <<: *default
  database: <%= ENV.fetch("RAILS_LUOXU_API_DEVELOPMENT_DATABASE_NAME", "rails_luoxu_api_development") %>

  # The specified database role being used to connect to PostgreSQL.
  # To create additional roles in PostgreSQL see `$ createuser --help`.
  # When left blank, PostgreSQL will use the default role. This is
  # the same name as the operating system user running Rails.
  username: <%= ENV["RAILS_LUOXU_API_DEVELOPMENT_DATABASE_USERNAME"] || (Rails.application.credentials.dig(:db, :username) rescue nil) %>

  # The password associated with the PostgreSQL role (username).
  password: <%= ENV["RAILS_LUOXU_API_DEVELOPMENT_DATABASE_PASSWORD"] || (Rails.application.credentials.dig(:db, :password) rescue nil) %>

  # Connect on a TCP socket. Omitted by default since the client uses a
  # domain socket that doesn't need configuration. Windows does not have
  # domain sockets, so uncomment these lines.
  host: <%= ENV["RAILS_LUOXU_API_DEVELOPMENT_DATABASE_HOST"] || (Rails.application.credentials.dig(:db, :host) rescue nil) %>

  # The TCP port the server listens on. Defaults to 5432.
  # If your server runs on a different port number, change accordingly.
  port: <%= ENV["RAILS_LUOXU_API_DEVELOPMENT_DATABASE_PORT"] || (Rails.application.credentials.dig(:db, :port) rescue nil) %>

  # Schema search path. The server defaults to $user,public
  #schema_search_path: myapp,sharedapp,public

  # Minimum log levels, in increasing order:
  #   debug5, debug4, debug3, debug2, debug1,
  #   log, notice, warning, error, fatal, and panic
  # Defaults to warning.
  #min_messages: notice

# Warning: The database defined as "test" will be erased and
# re-generated from your development database when you run "rake".
# Do not set this db to the same as development or production.
test:
  <<: *default
  database: rails_luoxu_api_test

# As with config/credentials.yml, you never want to store sensitive information,
# like your database password, in your source code. If your source code is
# ever seen by anyone, they now have access to your database.
#
# Instead, provide the password or a full connection URL as an environment
# variable when you boot the app. For example:
#
#   DATABASE_URL="postgres://myuser:mypass@localhost/somedatabase"
#
# If the connection URL is provided in the special DATABASE_URL environment
# variable, Rails will automatically merge its configuration values on top of
# the values provided in this file. Alternatively, you can specify a connection
# URL environment variable explicitly:
#
#   production:
#     url: <%= ENV["MY_APP_DATABASE_URL"] %>
#
# Read https://guides.rubyonrails.org/configuring.html#configuring-a-database
# for a full overview on how database connection configuration can be specified.
#
production:
  primary: &primary_production
    <<: *default
    url: <%= database_url_for.call(production_primary_database, "RAILS_LUOXU_API_DATABASE_URL", "DATABASE_URL") %>
    host: <%= ENV["RAILS_LUOXU_API_DATABASE_HOST"] %>
    port: <%= ENV["RAILS_LUOXU_API_DATABASE_PORT"] %>
    database: <%= production_primary_database %>
    username: <%= ENV.fetch("RAILS_LUOXU_API_DATABASE_USERNAME", "rails_luoxu_api") %>
    password: <%= ENV["RAILS_LUOXU_API_DATABASE_PASSWORD"] %>
  cache:
    <<: *primary_production
    url: <%= database_url_for.call(production_cache_database, "RAILS_LUOXU_API_DATABASE_CACHE_URL", "RAILS_LUOXU_API_DATABASE_URL", "DATABASE_URL") %>
    database: <%= production_cache_database %>
    migrations_paths: db/cache_migrate
  queue:
    <<: *primary_production
    url: <%= database_url_for.call(production_queue_database, "RAILS_LUOXU_API_DATABASE_QUEUE_URL", "RAILS_LUOXU_API_DATABASE_URL", "DATABASE_URL") %>
    database: <%= production_queue_database %>
    migrations_paths: db/queue_migrate
  cable:
    <<: *primary_production
    url: <%= database_url_for.call(production_cable_database, "RAILS_LUOXU_API_DATABASE_CABLE_URL", "RAILS_LUOXU_API_DATABASE_URL", "DATABASE_URL") %>
    database: <%= production_cable_database %>
    migrations_paths: db/cable_migrate
