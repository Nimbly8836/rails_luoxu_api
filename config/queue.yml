default: &default
  dispatchers:
    - polling_interval: 1
      batch_size: 500
  workers:
    - queues: [ telegram_sync, telegram_sync_backfill, telegram_maintenance, solid_queue_recurring ]
      threads: <%= ENV.fetch("TELEGRAM_JOB_THREADS", 1) %>
      polling_interval: 0.1

development:
  <<: *default

test:
  <<: *default

production:
  <<: *default
